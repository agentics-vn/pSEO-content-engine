name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  core:
    name: numerology-core (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm test
        working-directory: packages/numerology-core
      - run: npx tsc --noEmit -p .
        working-directory: packages/numerology-core

  functions:
    name: edge functions (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - run: deno test --allow-read tests/
        working-directory: supabase/functions
      - run: deno check prose-generate/index.ts prose-admin/index.ts content-api/index.ts
        working-directory: supabase/functions

  admin-ui:
    name: admin UI (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: npm, cache-dependency-path: admin/package-lock.json }
      - run: npm ci
        working-directory: admin
      - run: cp .env.example .env && npm run build
        working-directory: admin
