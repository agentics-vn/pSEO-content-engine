name: Deploy edge functions

# Deploys the two model/admin edge functions to the live engine project.
# Runs in GitHub's network (not a sandbox), so the Supabase CLI bundler
# resolves `@pseo/numerology-core` through supabase/functions/deno.json from
# the repo root exactly as the local runbook (docs/DEPLOY.md) does.
#
# content-api is intentionally NOT deployed here — it must keep verify_jwt=false
# and is stable; redeploying it risks flipping that flag.
#
# One-time setup: add a repo secret SUPABASE_ACCESS_TOKEN
#   (Supabase dashboard -> Account -> Access Tokens -> Generate).
# Then trigger from the Actions tab ("Run workflow"), or let it fire on a
# push to main that touches the function sources.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'packages/numerology-core/**'
      - '.github/workflows/deploy-functions.yml'

jobs:
  deploy:
    name: deploy prose-generate + prose-admin
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: mafqvoahltslxwttmvkn
    steps:
      - uses: actions/checkout@v4

      - name: Guard — access token present
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Add it in repo Settings -> Secrets -> Actions."
            exit 1
          fi

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # prose-generate: called only with the service-role bearer -> keep the
      # gateway JWT check ON (default).
      - name: Deploy prose-generate (verify_jwt ON)
        run: |
          supabase functions deploy prose-generate \
            --project-ref "$PROJECT_REF" \
            --import-map supabase/functions/deno.json

      # prose-admin: the Admin UI hits it with the operator's Supabase-Auth JWT
      # and the function validates JWT + site_admins itself. The gateway JWT must
      # be OFF or the browser CORS preflight (OPTIONS) is blocked.
      - name: Deploy prose-admin (verify_jwt OFF)
        run: |
          supabase functions deploy prose-admin \
            --project-ref "$PROJECT_REF" \
            --import-map supabase/functions/deno.json \
            --no-verify-jwt
